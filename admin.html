<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pool 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-section { margin-bottom: 30px; }
        .admin-section h3 { 
            background: var(--primary); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 16px;
        }
        .result-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .toggle-btn {
            background: var(--warning);
            margin-right: 10px;
        }
        .toggle-btn.active {
            background: var(--success);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Admin Panel</h1>
        </header>
        
        <div id="admin-login" class="card">
            <h2>Connexion Admin</h2>
            <input type="password" id="admin-password" placeholder="Mot de passe admin">
            <button class="btn primary" onclick="adminLogin()">Entrer</button>
        </div>
        
        <main id="admin-panel" class="hidden">
            <!-- Lock Controls -->
            <section class="card admin-section">
                <h3>🔒 Contrôle des phases</h3>
                <div>
                    <button class="btn toggle-btn" data-lock="groupsLocked">Groupes</button>
                    <button class="btn toggle-btn" data-lock="round16Locked">Huitièmes</button>
                    <button class="btn toggle-btn" data-lock="quarterLocked">Quarts</button>
                    <button class="btn toggle-btn" data-lock="semiLocked">Demis</button>
                    <button class="btn toggle-btn" data-lock="finalLocked">Finale</button>
                </div>
                <p style="margin-top: 12px; color: var(--text-muted)">
                    Vert = Verrouillé | Jaune = Ouvert
                </p>
            </section>
            
            <!-- Group Results -->
            <section class="card admin-section">
                <h3>📋 Résultats des Groupes</h3>
                <div id="admin-groups"></div>
                <button class="btn primary" onclick="saveGroupResults()">
                    💾 Sauvegarder résultats groupes
                </button>
            </section>
            
            <!-- Knockout Fixtures & Results -->
            <section class="card admin-section">
                <h3>⚔️ Matchs Éliminatoires</h3>
                <div id="admin-knockout"></div>
            </section>
            
            <!-- Bonus Results -->
            <section class="card admin-section">
                <h3>🎯 Résultats Bonus</h3>
                <div class="bonus-predictions">
                    <div class="bonus-item">
                        <label>Champion du Monde</label>
                        <select id="result-champion"></select>
                    </div>
                    <div class="bonus-item">
                        <label>Finaliste</label>
                        <select id="result-finalist"></select>
                    </div>
                    <div class="bonus-item">
                        <label>Meilleur Buteur</label>
                        <input type="text" id="result-topscorer">
                    </div>
                </div>
                <button class="btn primary" onclick="saveBonusResults()">
                    💾 Sauvegarder bonus
                </button>
            </section>
            
            <!-- Recalculate -->
            <section class="card">
                <button class="btn primary full-width" onclick="recalculateAllScores()">
                    🔄 Recalculer tous les scores
                </button>
            </section>
        </main>
    </div>
    
    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js)"></script>
    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js)"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/scoring.js"></script>
    <script>
        // Simple admin password (change this!)
        const ADMIN_PASSWORD = "pool2026admin";
        
        function adminLogin() {
            if (document.getElementById('admin-password').value === ADMIN_PASSWORD) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminPanel();
            } else {
                alert('Mot de passe incorrect');
            }
        }
        
        async function loadAdminPanel() {
            // Load settings
            const settingsDoc = await db.collection('settings').doc('tournament').get();
            const settings = settingsDoc.exists ? settingsDoc.data() : {};
            
            // Update lock buttons
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                const lockKey = btn.dataset.lock;
                btn.classList.toggle('active', settings[lockKey] === true);
                btn.onclick = () => toggleLock(lockKey);
            });
            
            // Load group results
            loadAdminGroups();
            
            // Populate team selects
            ['result-champion', 'result-finalist'].forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '<option value="">--</option>';
                WORLD_CUP_DATA.allTeams.forEach(t => {
                    select.innerHTML += `<option value="${t}">${t}</option>`;
                });
            });
            
            // Load existing results
            const resultsDoc = await db.collection('results').doc('official').get();
            if (resultsDoc.exists) {
                const results = resultsDoc.data();
                if (results.bonus) {
                    document.getElementById('result-champion').value = results.bonus.champion || '';
                    document.getElementById('result-finalist').value = results.bonus.finalist || '';
                    document.getElementById('result-topscorer').value = results.bonus.topScorer || '';
                }
            }
        }
        
        async function toggleLock(lockKey) {
            const btn = document.querySelector(`[data-lock="${lockKey}"]`);
            const newValue = !btn.classList.contains('active');
            
            await db.collection('settings').doc('tournament').set({
                [lockKey]: newValue
            }, { merge: true });
            
            btn.classList.toggle('active', newValue);
        }
        
        function loadAdminGroups() {
            const container = document.getElementById('admin-groups');
            container.innerHTML = '';
            
            for (const [groupName, teams] of Object.entries(WORLD_CUP_DATA.groups)) {
                const div = document.createElement('div');
                div.className = 'result-input';
                div.innerHTML = `
                    <label>Groupe ${groupName} - 1er:</label>
                    <select data-group="${groupName}" data-pos="0">
                        <option value="">--</option>
                        ${teams.filter(t => t !== '?').map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                    <label>Groupe ${groupName} - 2e:</label>
                    <select data-group="${groupName}" data-pos="1">
                        <option value="">--</option>
                        ${teams.filter(t => t !== '?').map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                `;
                container.appendChild(div);
            }
        }
        
        async function saveGroupResults() {
            const groups = {};
            
            for (const groupName of Object.keys(WORLD_CUP_DATA.groups)) {
                const pos1 = document.querySelector(`[data-group="${groupName}"][data-pos="0"]`).value;
                const pos2 = document.querySelector(`[data-group="${groupName}"][data-pos="1"]`).value;
                groups[groupName] = [pos1, pos2];
            }
            
            await db.collection('results').doc('official').set({
                groups: groups
            }, { merge: true });
            
            alert('✅ Résultats sauvegardés!');
        }
        
        async function saveBonusResults() {
            await db.collection('results').doc('official').set({
                bonus: {
                    champion: document.getElementById('result-champion').value,
                    finalist: document.getElementById('result-finalist').value,
                    topScorer: document.getElementById('result-topscorer').value
                }
            }, { merge: true });
            
            alert('✅ Bonus sauvegardés!');
        }
        
        async function recalculateAllScores() {
            await updateAllScores();
            alert('✅ Scores recalculés!');
        }
    </script>
</body>
</html>
