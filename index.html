<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Coupe du Monde 2026 🏆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Pool Coupe du Monde 2026</h1>
            <p class="subtitle">USA • Canada • Mexique</p>
        </header>

        <!-- Login/Register Section -->
        <section id="auth-section" class="card">
            <h2>Connexion</h2>
            <div class="tabs">
                <button class="tab active" data-tab="login">Se connecter</button>
                <button class="tab" data-tab="register">S'inscrire</button>
            </div>
            
            <form id="login-form" class="auth-form">
                <input type="text" id="login-name" placeholder="Ton nom/pseudo" required>
                <input type="password" id="login-password" placeholder="Mot de passe" required>
                <button type="submit" class="btn primary">Entrer</button>
            </form>
            
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="register-name" placeholder="Ton nom/pseudo" required>
                <input type="password" id="register-password" placeholder="Mot de passe (min 6 car.)" required>
                <button type="submit" class="btn primary">Créer mon compte</button>
            </form>
        </section>

        <!-- Main App (hidden until logged in) -->
        <main id="app-section" class="hidden">
            <div class="user-bar">
                <span id="user-display"></span>
                <button id="logout-btn" class="btn small">Déconnexion</button>
            </div>

            <nav class="main-nav">
                <button class="nav-btn active" data-view="leaderboard">🏅 Classement</button>
                <button class="nav-btn" data-view="groups">📋 Groupes</button>
                <button class="nav-btn" data-view="knockout">⚔️ Éliminatoires</button>
                <button class="nav-btn" data-view="bonus">🎯 Bonus</button>
            </nav>

            <!-- Leaderboard View -->
            <section id="leaderboard-view" class="view active">
                <h2>🏅 Classement en direct</h2>
                <div id="leaderboard" class="leaderboard"></div>
            </section>

            <!-- Groups Predictions View -->
            <section id="groups-view" class="view hidden">
                <h2>📋 Prédictions des Groupes</h2>
                <p class="info">Place les équipes dans l'ordre prédit (1er, 2e)</p>
                <div id="groups-container"></div>
                <button id="save-groups" class="btn primary full-width">💾 Sauvegarder mes prédictions</button>
            </section>

            <!-- Knockout Predictions View -->
            <section id="knockout-view" class="view hidden">
                <h2>⚔️ Phase Éliminatoire</h2>
                <div id="knockout-phases"></div>
            </section>

            <!-- Bonus Predictions View -->
            <section id="bonus-view" class="view hidden">
                <h2>🎯 Prédictions Bonus</h2>
                <div class="bonus-predictions">
                    <div class="bonus-item">
                        <label>🥇 Champion du Monde (25 pts)</label>
                        <select id="bonus-champion"></select>
                    </div>
                    <div class="bonus-item">
                        <label>🥈 Finaliste (15 pts)</label>
                        <select id="bonus-finalist"></select>
                    </div>
                    <div class="bonus-item">
                        <label>⚽ Meilleur Buteur (10 pts)</label>
                        <input type="text" id="bonus-topscorer" placeholder="Nom du joueur">
                    </div>
                </div>
                <button id="save-bonus" class="btn primary full-width">💾 Sauvegarder</button>
            </section>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js)"></script>
    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js)"></script>
    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js)"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/predictions.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
